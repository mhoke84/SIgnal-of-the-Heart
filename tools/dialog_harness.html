<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radio Underground — Dialog Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#372c3d; --plum2:#2a2130;
    --box:#17110f; --box2:#211814;
    --gold:#c9a24b; --gold-hi:#f0d98c; --gold-lo:#7c5c22;
    --ink:#f3ead2; --ink-dim:#b8a67e;
    --hot:#ff8a2a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(120% 120% at 50% 30%, var(--plum) 0%, var(--plum2) 100%);
    font-family:'VT323','Courier New',monospace;
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:26px;padding:28px 16px;min-height:100%;
    -webkit-font-smoothing:none;
  }
  .wrap{width:100%;max-width:760px;}

  /* ---- the dialogue box ---- */
  .dialogue{
    position:relative;display:flex;gap:0;
    background:linear-gradient(180deg,var(--box2),var(--box));
    border:3px solid var(--gold);
    box-shadow:0 0 0 1px var(--gold-lo), 0 0 0 5px var(--box),
               0 0 0 6px var(--gold-lo), 8px 10px 0 rgba(0,0,0,.35);
    padding:12px;
  }
  .dialogue::before{ /* inner hairline frame */
    content:"";position:absolute;inset:6px;border:1px solid var(--gold-lo);
    pointer-events:none;
  }
  /* corner flourishes */
  .corner{position:absolute;width:22px;height:22px;color:var(--gold-hi);opacity:.9;pointer-events:none;}
  .corner.tl{top:2px;left:2px;} .corner.tr{top:2px;right:2px;transform:scaleX(-1);}
  .corner.bl{bottom:2px;left:2px;transform:scaleY(-1);} .corner.br{bottom:2px;right:2px;transform:scale(-1,-1);}

  /* portrait */
  .portrait{
    position:relative;flex:0 0 auto;width:200px;height:200px;
    background:#000;border:2px solid var(--gold-lo);
    box-shadow:inset 0 0 0 1px #000, inset 0 0 18px rgba(0,0,0,.8);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  #portraitImg{
    width:192px;height:192px;image-rendering:pixelated;
    image-rendering:crisp-edges;display:block;
  }

  /* text panel */
  .panel{position:relative;flex:1 1 auto;padding:26px 18px 22px 20px;min-width:0;}
  .nameplate{
    position:absolute;top:-14px;left:14px;
    background:linear-gradient(180deg,#2c2018,#191210);
    border:2px solid var(--gold);padding:2px 14px 3px;
    font-size:26px;line-height:1;color:var(--gold-hi);
    letter-spacing:1px;text-shadow:1px 1px 0 #000;
    box-shadow:2px 2px 0 rgba(0,0,0,.4);
  }
  .nameplate::after{content:"";position:absolute;left:8px;right:8px;bottom:1px;height:2px;background:var(--gold-lo);}
  /* flame accent by the nameplate */
  .flame{position:absolute;top:-20px;left:118px;width:14px;height:20px;pointer-events:none;}
  .flame span{position:absolute;left:0;bottom:0;width:14px;height:18px;
    background:radial-gradient(60% 70% at 50% 80%, #ffd24a 0%, var(--hot) 55%, #d23c12 100%);
    clip-path:polygon(50% 0,72% 32%,66% 44%,86% 55%,74% 82%,50% 100%,26% 82%,14% 55%,34% 44%,28% 32%);
    animation:flick .18s steps(2) infinite;filter:drop-shadow(0 0 4px rgba(255,120,30,.6));}
  @keyframes flick{0%{transform:scaleY(1) translateX(0);}50%{transform:scaleY(.86) translateX(.5px);}100%{transform:scaleY(1.04) translateX(-.5px);}}

  .text{font-size:30px;line-height:1.16;min-height:112px;white-space:pre-wrap;
    text-shadow:1px 1px 0 #000;word-break:break-word;}
  .caret{color:var(--gold-hi);}
  .advance{position:absolute;right:14px;bottom:8px;color:var(--gold-hi);font-size:22px;
    opacity:0;animation:bob .9s ease-in-out infinite;}
  .advance.show{opacity:.95;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(3px);}}
  .hint{position:absolute;left:20px;bottom:6px;color:var(--ink-dim);font-size:18px;opacity:.6;}

  /* ---- test controls ---- */
  .controls{width:100%;max-width:760px;display:flex;flex-wrap:wrap;gap:14px 22px;
    align-items:center;padding:16px 18px;border:1px solid #4d3f52;border-radius:8px;
    background:rgba(0,0,0,.22);font-family:'VT323','Courier New',monospace;}
  .controls .group{display:flex;align-items:center;gap:8px;}
  .controls label{font-size:20px;color:var(--ink-dim);}
  .seg{display:inline-flex;border:1px solid var(--gold-lo);border-radius:6px;overflow:hidden;}
  .seg button{background:transparent;color:var(--ink-dim);border:0;padding:6px 14px;
    font-family:inherit;font-size:20px;cursor:pointer;letter-spacing:.5px;}
  .seg button.on{background:var(--gold);color:#1a120c;}
  .tag{font-size:14px;color:var(--hot);margin-left:6px;vertical-align:middle;}
  input[type=text]{flex:1 1 220px;min-width:180px;background:#140f13;border:1px solid #4d3f52;
    color:var(--ink);font-family:inherit;font-size:20px;padding:7px 10px;border-radius:6px;}
  input[type=range]{accent-color:var(--gold);}
  .play{background:var(--gold);color:#1a120c;border:0;border-radius:6px;padding:8px 20px;
    font-family:inherit;font-size:22px;cursor:pointer;letter-spacing:1px;}
  .play:active{transform:translateY(1px);}
  .speedval{font-size:18px;color:var(--ink-dim);width:70px;}
  @media (max-width:560px){
    .dialogue{flex-direction:column;align-items:center;}
    .portrait{width:170px;height:170px;} #portraitImg{width:160px;height:160px;}
    .panel{padding-top:30px;} .text{font-size:26px;} .nameplate{left:10px;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="dialogue" id="box" title="click to skip / advance">
      <svg class="corner tl" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 12 C2 5 5 2 12 2 M2 8 C2 4 4 2 8 2 M6 6 q4 0 4 4"/></svg>
      <svg class="corner tr" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 12 C2 5 5 2 12 2 M2 8 C2 4 4 2 8 2 M6 6 q4 0 4 4"/></svg>
      <svg class="corner bl" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 12 C2 5 5 2 12 2 M2 8 C2 4 4 2 8 2 M6 6 q4 0 4 4"/></svg>
      <svg class="corner br" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 12 C2 5 5 2 12 2 M2 8 C2 4 4 2 8 2 M6 6 q4 0 4 4"/></svg>
      <div class="portrait"><img id="portraitImg" alt="portrait"></div>
      <div class="panel">
        <div class="nameplate">MIKE</div>
        <div class="flame"><span></span></div>
        <div class="text" id="text"></div>
        <div class="advance" id="advance">▼</div>
      </div>
    </div>

    <div class="controls">
      <div class="group">
        <label>Mood</label>
        <div class="seg" id="mood">
          <button data-m="neutral" class="on">NEUTRAL</button>
          <button data-m="angry">ANGRY</button>
          <button data-m="worried">WORRIED</button>
        </div>
        <span class="tag" id="moodtag"></span>
      </div>
      <div class="group" style="flex:1 1 260px;">
        <label>Line</label>
        <input type="text" id="line" value="">
      </div>
      <div class="group">
        <label>Speed</label>
        <input type="range" id="speed" min="6" max="60" value="26">
        <span class="speedval" id="speedval"></span>
      </div>
      <button class="play" id="play">PLAY ▶</button>
    </div>
  </div>

const LINES = {
  neutral:"Alright... if the algorithm wants a fight, we give it one. Eighty-seven point nine. Let's light it up.",
  angry:"You wiped a hundred years of records for a PLAYLIST? No. Not my store. Not tonight.",
  worried:"What if nobody's listening out there? What if it's just us and the static...",
};
const OPEN_SEQ=["m0","m1","m2","m1"]; // mouth cycle while typing
let mood="neutral", imgs={}, typing=false, done=false;
let typeTimer=null, flapTimer=null, flapIdx=0, shown=0, full="";
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

// preload
for(const m in FRAMES){imgs[m]={};for(const k in FRAMES[m]){const i=new Image();i.src=FRAMES[m][k];imgs[m][k]=i;}}
const P=document.getElementById('portraitImg');
const T=document.getElementById('text');
const ADV=document.getElementById('advance');
const lineInput=document.getElementById('line');
const speed=document.getElementById('speed');
const speedval=document.getElementById('speedval');
const moodtag=document.getElementById('moodtag');

function setFace(k){P.src=FRAMES[mood][k];}
function stopTimers(){clearInterval(typeTimer);clearInterval(flapTimer);typeTimer=flapTimer=null;}

function play(){
  stopTimers();
  full=lineInput.value; shown=0; typing=true; done=false; flapIdx=0;
  ADV.classList.remove('show');
  render();
  const cps=parseInt(speed.value,10);
  const perChar=Math.max(8,Math.round(1000/cps));
  typeTimer=setInterval(()=>{
    shown++; render();
    if(shown>=full.length){finish();}
  },perChar);
  if(reduce){ setFace('m1'); }
  else {
    flapTimer=setInterval(()=>{ setFace(OPEN_SEQ[flapIdx%OPEN_SEQ.length]); flapIdx++; },95);
  }
}
function finish(){
  stopTimers(); typing=false; done=true; shown=full.length; render();
  setFace('rest'); ADV.classList.add('show');
}
function render(){
  const vis=full.slice(0,shown);
  T.innerHTML = vis.replace(/&/g,'&amp;').replace(/</g,'&lt;') + (typing?'<span class="caret">▌</span>':'');
}

// mood buttons
document.getElementById('mood').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  mood=b.dataset.m;
  moodtag.textContent = (mood==='worried')?'placeholder — subtle':'';
  if(!lineInput.dataset.edited) lineInput.value=LINES[mood];
  setFace('rest'); T.textContent=''; done=false; ADV.classList.remove('show');
});
lineInput.addEventListener('input',()=>{lineInput.dataset.edited="1";});
speed.addEventListener('input',()=>{speedval.textContent=speed.value+" cps";});
document.getElementById('play').addEventListener('click',play);
// click box: skip while typing, replay when done
document.getElementById('box').addEventListener('click',()=>{
  if(typing) finish(); else play();
});

// init
lineInput.value=LINES[mood]; speedval.textContent=speed.value+" cps";
setFace('rest'); T.textContent="Press PLAY ▶ (or click the box)";
</script>
